roi_conf_threshold: 0.25
bg_conf_threshold: 0.45
nms_iou: 0.45
mvs_index: 0
mvs_exposure_us: -1.
mvs_gain: -1.
mvs_frame_rate: 100.
headless: 1
record_rendered: 0
mock_gimbal: 1
use_yolo: 1
window_name: "Central Control"
can_channel: "PCAN_USBBUS1"
h_fov: 45.
v_fov: 34.
yaw_zero: 0.
pitch_zero: 0.
yaw_rpm_per_deg: 25.
pitch_rpm_per_deg: 25.
