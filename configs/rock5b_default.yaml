%YAML:1.0
---
source: "mvs"
backend: "rknn"
model_onnx: "src/yolo11n.onnx"
model_rknn: "models/rknn/yolo11n.rknn"
output_dir: "outputs"
output_prefix: "central_control_rock5b"
target_fps: 100
duration_sec: 30
input_width: 1280
input_height: 720
yolo_input_size: 640
motion_points: 128
blur_kernel: 21
